name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
        GSI:
              description: ' GSI Image Direct Link '
              required: true
              default: 'https://github.com/mytja/treble_pixelos/releases/download/20250806/pixelos_arm64_bgN_ext4-16.0-unofficial-20250806.img.xz'        
        NAME:
              description: 'Rom Name'
              required: true
              default: 'aosp-arm64-ab-gapps-14.0-a03.7z'
        VERSION:
              description: 'Baseband Version'
              required: true
              default: 'A035FXXS9CYG1'
        VENDOR:
              description: 'Enter Direct Link Of Your Version Vendor'
              required: true
              default: 'https://github.com/idksomethingaha/aod/releases/download/n/vendor.img'

jobs:
  Build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget android-sdk-libsparse-utils
        
    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary
        bash install.sh

    - name: Downloading and Extracting GSI
      run: |
        cd lpbinary/binary
        wget -O gsi_image.img.xz "${{ github.event.inputs.GSI }}"
        unxz gsi_image.img.xz
        mv gsi_image.img system.img

    - name: Preparing Files (Vendor, Product, Ext)
      run: |
        cd lpbinary/binary
        wget -O vendor.img "${{ github.event.inputs.VENDOR }}"
        wget -O product.img "https://github.com/idksomethingaha/aod/releases/download/n/product.img"
        wget -O system_ext.img "https://github.com/idksomethingaha/aod/releases/download/n/system_ext.img"

    - name: Convert Sparse to Raw (Fixing Invalid Sparse Format)
      run: |
        cd lpbinary/binary
        for img in system.img vendor.img product.img system_ext.img; do
          if [ -f "$img" ]; then
            echo "Checking and converting $img..."
            simg2img "$img" "${img}.raw" 2>/dev/null || cp "$img" "${img}.raw"
            mv "${img}.raw" "$img"
          fi
        done

    - name: Packing Super Image
      run: |
        cd lpbinary/binary
        # Lấy kích thước chính xác sau khi unsparse
        SYS_SIZE=$(ls -nl system.img | awk '{print $5}')
        VEN_SIZE=$(ls -nl vendor.img | awk '{print $5}')
        PROD_SIZE=$(ls -nl product.img | awk '{print $5}')
        EXT_SIZE=$(ls -nl system_ext.img | awk '{print $5}')
        
        # Thiết lập thông số mới cho Samsung A03 (64GB)
        # Nâng giới hạn lên ~8.5GB để tránh lỗi "not enough space"
        SUPER_DEVICE_SIZE=9126805504
        SUPER_GROUP_SIZE=9124708352
        
        echo "Packing with Device Size: $SUPER_DEVICE_SIZE"
        
        ./lpmake --metadata-size 65536 --super-name super --metadata-slots 2 \
          --device super:$SUPER_DEVICE_SIZE --group main:$SUPER_GROUP_SIZE \
          --partition system:readonly:$SYS_SIZE:main --image system=system.img \
          --partition vendor:readonly:$VEN_SIZE:main --image vendor=vendor.img \
          --partition product:readonly:$PROD_SIZE:main --image product=product.img \
          --partition system_ext:readonly:$EXT_SIZE:main --image system_ext=system_ext.img \
          --sparse --output super.img

    - name: Creating tar and compressing
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        7z a "${{ github.event.inputs.NAME }}" super.tar
        rm -rf super.tar super.img

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
            Device: Samsung Galaxy A03
            Version: ${{ github.event.inputs.VERSION }}
            Rom Name: ${{ github.event.inputs.NAME }}
            Note: Super partition size increased to 8.5GB.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
